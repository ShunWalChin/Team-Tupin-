map $http_x_forwarded_proto $team_tupina_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

upstream team_tupina_wger_app {
    server wger-web:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;
    charset utf-8;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-Frame-Options "DENY" always;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /static/ {
        alias /srv/wger/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location /media/ {
        alias /srv/wger/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://team_tupina_wger_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $team_tupina_forwarded_proto;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
    }
}
